version: '3.8'

services:
  # ==========================================
  # FastAPI Backend Service
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sre_copilot_backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Map the local reports/ folder so that generated reports are saved on your computer,
      # even if the docker container is stopped or deleted!
      - ./reports:/app/reports
      # Persist the vector database (KEDB index)
      - chroma_data:/app/rag/chroma_db
    restart: unless-stopped

  # ==========================================
  # Streamlit Frontend Service
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sre_copilot_frontend
    ports:
      - "8501:8501"
    environment:
      # Streamlit server runs in python, so it calls the backend using container DNS names.
      # "http://backend:8000" matches the service name of the backend in this docker-compose file.
      - API_BASE_URL=http://backend:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
    volumes:
      # Also map reports folder in the UI so it can read files from it
      - ./reports:/app/reports
    restart: unless-stopped

volumes:
  chroma_data:
